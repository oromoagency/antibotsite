name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          ANTIBOT_ZERO_BOT_MODE: 'true'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - name: Check no secrets in source
        run: |
          ! grep -rE "(SECRET_KEY|ADMIN_TOKEN)\s*=\s*['\"][^'\"]{8,}" src/ --include="*.js"
      - name: Check no raw data in API routes
        run: |
          ! grep -n "return res.json(rawData\|return res.json(DEMO_DATASET\|return res.json(USERS_DATASET" src/routes/api.js
